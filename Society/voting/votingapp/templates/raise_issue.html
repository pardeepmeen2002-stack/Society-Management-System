<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Raise an Issue</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f5f9;
        }

        .container {
            width: 420px;
            margin: 60px auto;
            background: #ffffff;
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h3 {
            margin-bottom: 15px;
            font-size: 18px;
            color: #333;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #555;
            display: block;
            margin: 10px 0 5px;
        }

        select,
        input[type="text"],
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #cfd6e0;
            border-radius: 4px;
            font-size: 14px;
        }

        textarea {
            height: 90px;
            resize: none;
        }

        .upload-box {
            margin-top: 10px;
        }

        input[type="file"] {
            font-size: 13px;
        }

        .btn {
            width: 100%;
            margin-top: 18px;
            padding: 10px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #0f5fd4;
        }
    </style>
</head>
<body>

<div class="container">
    <h3>Raise an Issue</h3>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}

      <select name="category">
        <option>Planning</option>
        <option>Plumbing</option>
        <option>Security</option>
    </select>


    <input type="text" name="title" placeholder="Issue Title">
    <textarea name="description" placeholder="description"></textarea>

    <button type="submit">Submit Issue</button>
</form>
</div>

</body>
</html>
