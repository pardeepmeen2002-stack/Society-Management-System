<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Issue Notification</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .notification {
            background-color: #ffffff;
            width: 400px;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.15);
            border-left: 6px solid #ff9800;
        }

        .notification h2 {
            margin: 0;
            font-size: 20px;
            color: #333;
        }

        .notification p {
            margin: 12px 0 20px;
            font-size: 15px;
            color: #555;
        }

        .btn {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="notification">
        <h2>📢 New Issue Raised</h2>
        <p>
            A member has raised a new issue and is requesting a solution.
            Please review the issue and provide your solution.
        </p>
        <button class="btn">View Issue</button>
    </div>

</body>
</html>
