<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Issue Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 40px;
        }

        .card {
            width: 420px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .card-header {
            padding: 15px 20px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 18px;
            font-weight: bold;
        }

        .card-body {
            padding: 20px;
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .issue-title {
            font-size: 16px;
            font-weight: bold;
        }

        .badge {
            background-color: #e6f0ff;
            color: #2563eb;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: bold;
        }

        .description {
            font-size: 14px;
            color: #555;
            margin-bottom: 15px;
        }

        .image-container img {
            width: 100%;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        Issue Details
    </div>

    <div class="card-body">
        <div class="title-row">
            <div class="issue-title">{{ Raise_issue.title }}</div>
        </div>

        <div class="description">
            {{ Raise_issue.description }}
        </div>
    </div>
</div>

</body>
</html>
