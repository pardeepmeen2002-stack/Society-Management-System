<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color:#f2f2f2;
}

.login{
    width:30%;
    margin:100px auto;
    background:white;
    padding:25px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.login input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

.login button{
    width:100%;
    padding:10px;
    background-color:#3498db;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

.login button:hover{
    background-color:#2980b9;
}
</style>

</head>
<body>

<form method="post">
{% csrf_token %}

<div class="login">

<input type="text" name="email" placeholder="Email">

<input type="password" name="password" placeholder="Password">

<button type="submit">Login</button>

</div>

</form>

</body>
</html>
