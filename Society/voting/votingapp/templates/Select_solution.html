<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Solution</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #fff;
            width: 700px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 20px;
        }

        .card h3 {
            margin: 0 0 10px;
            font-size: 18px;
        }

        .subtitle {
            color: #555;
            margin-bottom: 15px;
        }

        .solutions {
            display: flex;
            gap: 15px;
        }

        .solution-box {
            flex: 1;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .solution-box input[type="radio"] {
            display: none;
        }

        .solution-box label {
            display: block;
            cursor: pointer;
        }

        .solution-box input[type="radio"]:checked + label {
            border: 2px solid #2b6df6;
            background: #f0f5ff;
            border-radius: 6px;
            padding: 10px;
        }

        select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .solution-text {
            color: #555;
            margin-bottom: 12px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-primary {
            background: #2b6df6;
            color: #fff;
        }

        .btn-secondary {
            background: #e9ecef;
            color: #555;
        }
    </style>
</head>
<body>

        <div class="subtitle">Choose Solution for: <b>Leaking Pipe</b></div>

                    </select>
                    <button type="submit" class="btn-primary">
                        Select Solution
                    </button>
                </label>
            </div>
